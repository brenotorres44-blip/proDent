<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DentalPro — Seed</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F8FA;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:500px;border:1px solid #E4E9EE}
h1{font-size:18px;font-weight:700;margin-bottom:8px}
p{font-size:13.5px;color:#5A6A7A;margin-bottom:24px;line-height:1.6}
.btn{padding:10px 20px;background:#2D7DD2;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:20px;background:#F7F8FA;border-radius:8px;padding:16px;font-family:monospace;font-size:13px;max-height:300px;overflow-y:auto;color:#0F1923;line-height:1.8;display:none}
.warn{background:#FDF4E6;border:1px solid #FAC775;border-radius:8px;padding:12px 16px;font-size:13px;color:#7A5500;margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
  <h1><i class="ti ti-database-import"></i> Seed de Dados — DentalPro</h1>
  <p>Popula o Firestore com pacientes, agendamentos, procedimentos e contas de exemplo para teste.</p>
  <div class="warn"><i class="ti ti-alert-triangle"></i> <b>Execute apenas uma vez.</b> Rodar novamente duplicará os dados.</div>
  <button class="btn" id="btn" onclick="iniciar()">Iniciar Seed</button>
  <div class="log" id="log"></div>
</div>

<script type="module">
import { requireAuth } from "./js/auth.js";
import { runSeed }     from "./js/seed.js";

requireAuth(() => {});

window.iniciar = async function() {
  const btn = document.getElementById("btn");
  const log = document.getElementById("log");
  btn.disabled = true;
  log.style.display = "block";
  log.innerHTML = "";

  function append(msg) {
    log.innerHTML += msg + "<br>";
    log.scrollTop = log.scrollHeight;
  }

  try {
    await runSeed(append);
  } catch(e) {
    append("❌ Erro: " + e.message);
    btn.disabled = false;
  }
};
</script>
</body>
</html>
