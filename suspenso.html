<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentalPro — Conta Suspensa</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F8FA;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;border:1px solid #E4E9EE}
.icon{width:64px;height:64px;background:#FDEAEA;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px;color:#D94040}
h1{font-size:22px;font-weight:700;margin-bottom:8px}
p{font-size:14px;color:#5A6A7A;line-height:1.6;margin-bottom:24px}
.info-box{background:#F7F8FA;border-radius:10px;padding:16px;margin-bottom:24px;font-size:13px;color:#0F1923;line-height:1.8;text-align:left}
.info-box span{color:#5A6A7A;font-size:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all .15s}
.btn-primary{background:#2D7DD2;color:#fff}
.btn-primary:hover{background:#1A5FA8}
.btn-ghost{background:transparent;color:#5A6A7A;border:1px solid #E4E9EE}
.btn-ghost:hover{background:#F7F8FA}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="ti ti-lock"></i></div>
  <h1>Acesso suspenso</h1>
  <p>Sua clínica está com o acesso temporariamente suspenso. Verifique a situação do seu plano para reativar.</p>

  <div class="info-box" id="info-box">
    <span>Clínica</span><br>
    <strong id="nome-clinica">—</strong><br><br>
    <span>Plano</span><br>
    <strong id="plano">—</strong><br><br>
    <span>Status</span><br>
    <strong id="status" style="color:#D94040">—</strong>
  </div>

  <div class="actions">
    <a href="mailto:suporte@dentalpro.com.br?subject=Reativação de conta" class="btn btn-primary">
      <i class="ti ti-mail"></i> Falar com suporte
    </a>
    <button class="btn btn-ghost" onclick="sair()">
      <i class="ti ti-logout"></i> Sair
    </button>
  </div>
</div>

<script type="module">
import { logout } from "./js/auth.js";
import { carregarTenant, PLANOS, diasRestantesTrial } from "./js/tenant.js";
import { getClinicaIdSessao } from "./js/tenant.js";
import { auth } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "login.html"; return; }
  const clinicaId = getClinicaIdSessao();
  if (!clinicaId) return;
  const tenant = await carregarTenant(clinicaId);
  if (!tenant) return;

  document.getElementById("nome-clinica").textContent = tenant.nome;
  document.getElementById("plano").textContent = PLANOS[tenant.plano]?.nome || tenant.plano;

  const statusMap = {
    trial:     `Trial — ${diasRestantesTrial(tenant)} dias restantes`,
    suspenso:  "Suspenso",
    cancelado: "Cancelado"
  };
  document.getElementById("status").textContent = statusMap[tenant.status] || tenant.status;
});

window.sair = async function() { await logout(); };
</script>
</body>
</html>
