<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentalPro — Conta Suspensa</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D1320;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;color-scheme:dark}
.card{background:#151D2E;border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;border:1px solid #232C40}
.icon{width:64px;height:64px;background:rgba(244,115,107,.14);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px;color:#F4736B}
h1{font-size:22px;font-weight:700;color:#EAF0FA;margin-bottom:8px}
p{font-size:14px;color:#8493AD;line-height:1.6;margin-bottom:24px}
.info-box{background:#1B2435;border-radius:10px;padding:16px;margin-bottom:24px;font-size:13px;color:#EAF0FA;line-height:1.8;text-align:left;border:1px solid #232C40}
.info-box span{color:#8493AD;font-size:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,#5B8CFF,#3F6FD8);color:#fff}
.btn-primary:hover{box-shadow:0 4px 16px rgba(91,140,255,.35)}
.btn-ghost{background:transparent;color:#8493AD;border:1px solid #232C40}
.btn-ghost:hover{background:#1B2435}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
@media(max-width:420px){.card{padding:32px 22px}}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="ti ti-lock"></i></div>
  <h1>Acesso suspenso</h1>
  <p>Sua clínica está com o acesso temporariamente suspenso. Verifique a situação do seu plano para reativar.</p>

  <div class="info-box" id="info-box">
    <span>Clínica</span><br>
    <strong id="nome-clinica">—</strong><br><br>
    <span>Plano</span><br>
    <strong id="plano">—</strong><br><br>
    <span>Status</span><br>
    <strong id="status" style="color:#F4736B">—</strong>
  </div>

  <div class="actions">
    <a href="mailto:suporte@dentalpro.com.br?subject=Reativação de conta" class="btn btn-primary">
      <i class="ti ti-mail"></i> Falar com suporte
    </a>
    <button class="btn btn-ghost" onclick="sair()">
      <i class="ti ti-logout"></i> Sair
    </button>
  </div>
</div>

<script type="module">
import { logout } from "./js/auth.js";
import { carregarTenant, PLANOS, diasRestantesTrial } from "./js/tenant.js";
import { getClinicaIdSessao } from "./js/tenant.js";
import { auth } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "login.html"; return; }
  const clinicaId = getClinicaIdSessao();
  if (!clinicaId) return;
  const tenant = await carregarTenant(clinicaId);
  if (!tenant) return;

  document.getElementById("nome-clinica").textContent = tenant.nome;
  document.getElementById("plano").textContent = PLANOS[tenant.plano]?.nome || tenant.plano;

  const statusMap = {
    trial:     `Trial — ${diasRestantesTrial(tenant)} dias restantes`,
    suspenso:  "Suspenso",
    cancelado: "Cancelado"
  };
  document.getElementById("status").textContent = statusMap[tenant.status] || tenant.status;
});

window.sair = async function() { await logout(); };
</script>
</body>
</html>
